name: Revision Semanal Arritmias

on:
  schedule:
    - cron: '0 8 * * 1'  # Cada lunes a las 8:00 AM UTC (10:00 Canarias)
  workflow_dispatch:     # Permite ejecutar manualmente desde la UI

jobs:
  literature-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar busqueda bibliografica
      run: python agente_arritmias.py

    - name: Commit y push de reportes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reportes/ README.md
        git diff --staged --quiet || git commit -m "Reporte semanal $(date +%Y-%m-%d) [auto]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Subir reporte como artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reporte-arritmias-semanal
        path: reportes/
        retention-days: 30
