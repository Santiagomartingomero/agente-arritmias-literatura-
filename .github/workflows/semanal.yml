name: Revision Semanal Arritmias

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  literature-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar busqueda bibliografica
      run: python agente_arritmias.py

    - name: Commit y push de reportes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reportes/ README.md
        git diff --staged --quiet || git commit -m "Reporte semanal $(date +%Y-%m-%d) [auto]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Contar papers del reporte
      id: count_papers
      run: |
        COUNT=$(python -c "import json, glob; files = sorted(glob.glob('reportes/*.json')); print(len(json.load(open(files[-1])))) if files else print(0)")
        echo "papers=$COUNT" >> $GITHUB_OUTPUT

    - name: Enviar notificacion Telegram
      run: |
        DATE=$(date +%Y-%m-%d)
        PAPERS=${{ steps.count_papers.outputs.papers }}
        TEXT="📊 Reporte Semanal Arritmias%0A%0A📅 Semana: ${DATE}%0A🔬 Papers encontrados: ${PAPERS}%0A%0A🔹 Fibrilacion Auricular%0A🔹 Taquicardia Ventricular%0A🔹 Dispositivos Cardiacos%0A🔹 Investigacion Emergente%0A%0A📖 Ver reporte: https://github.com/Santiagomartingomero/agente-arritmias-literatura-/tree/main/reportes"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${TEXT}"

    - name: Subir reporte como artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reporte-arritmias-semanal
        path: reportes/
        retention-days: 30
